name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.5.1
          use-dotnet: false

      - name: Download web export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.5.1.stable
          curl -sL https://github.com/godotengine/godot/releases/download/4.5.1-stable/Godot_v4.5.1-stable_export_templates.tpz -o /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates
          cp /tmp/templates/templates/web_* ~/.local/share/godot/export_templates/4.5.1.stable/

      - name: Build Godot web export
        run: |
          mkdir -p web
          cp CNAME web/CNAME
          touch web/.nojekyll
          godot --headless --path client --export-release Web ../web/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
