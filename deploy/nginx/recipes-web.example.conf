server {
    listen 80;
    server_name recipes.grassecon.org;

    # Use certbot or your TLS automation of choice, then redirect HTTP to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name recipes.grassecon.org;

    root /var/www/recipes;
    index index.html;

    # ssl_certificate /etc/letsencrypt/live/recipes.grassecon.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/recipes.grassecon.org/privkey.pem;

    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
