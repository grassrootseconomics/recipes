server {
    listen 80;
    server_name recipes-server.grassecon.org;

    # Use certbot or your TLS automation of choice, then redirect HTTP to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name recipes-server.grassecon.org;

    # ssl_certificate /etc/letsencrypt/live/recipes-server.grassecon.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/recipes-server.grassecon.org/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
